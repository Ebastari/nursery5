<!--
Form input data bibit untuk Google Apps Script (tanpa CORS, bisa ditempel di dialog HTML atau sidebar)
-->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Data Bibit - Montana AI</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 0; }
    .container { max-width: 420px; margin: 32px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px #0001; padding: 28px 24px; }
    h2 { text-align: center; color: #10b981; margin-bottom: 18px; }
    label { display: block; margin-top: 12px; font-weight: 500; color: #222; }
    input, select { width: 100%; padding: 8px 10px; margin-top: 4px; border: 1px solid #bbb; border-radius: 5px; font-size: 15px; }
    button { margin-top: 22px; width: 100%; background: #10b981; color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #059669; }
    .result { margin-top: 18px; padding: 10px; border-radius: 6px; font-size: 15px; }
    .result.success { background: #d1fae5; color: #166534; }
    .result.error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Input Data Bibit</h2>
    <form id="bibitForm">
      <label for="tanggal">Tanggal</label>
      <input type="date" id="tanggal" name="tanggal" required>

      <label for="bibit">Jenis Bibit</label>
      <input type="text" id="bibit" name="bibit" required placeholder="Contoh: Sengon Potting">

      <label for="masuk">Jumlah Masuk</label>
      <input type="number" id="masuk" name="masuk" min="0" value="0">

      <label for="keluar">Jumlah Keluar</label>
      <input type="number" id="keluar" name="keluar" min="0" value="0">

      <label for="mati">Jumlah Mati</label>
      <input type="number" id="mati" name="mati" min="0" value="0">

      <label for="sumber">Sumber</label>
      <input type="text" id="sumber" name="sumber" placeholder="Asal bibit">

      <label for="tujuan">Tujuan</label>
      <input type="text" id="tujuan" name="tujuan" placeholder="Lokasi/Tim">

<label for="dibuatOleh">Dibuat Oleh</label>
<select id="dibuatOleh" name="dibuatOleh" required>
  <option value="">-- Pilih Petugas --</option>
</select>

<label for="driver">Driver</label>
<select id="driver" name="driver" required>
  <option value="">-- Pilih Driver --</option>
</select>

      <button type="submit">Simpan Data</button>
    </form>
    <div id="result" class="result" style="display:none"></div>
  </div>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaDhpB0PQK2P1IgvglL7pw_1hDgVRzrF6rOiyuNvyrRsi6mp8fMsJCBk5Dj58IMWE/exec';
    
    // Load dropdown options on page load
    window.onload = async function() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=dropdowns`);
        const opts = await res.json();
        
        // Populate Dibuat Oleh dropdown
        const dibuatOlehSelect = document.getElementById('dibuatOleh');
        opts.dibuatOleh.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          dibuatOlehSelect.appendChild(opt);
        });
        
        // Populate Driver dropdown
        const driverSelect = document.getElementById('driver');
        opts.driver.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          driverSelect.appendChild(opt);
        });
      } catch(e) {
        console.log('Dropdown load failed:', e);
      }
    };

    document.getElementById('bibitForm').onsubmit = async function(e) {
      e.preventDefault();
      var form = e.target;
      var formData = new FormData(form);
      var resultDiv = document.getElementById('result');
      resultDiv.style.display = 'none';
      
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'
        });
        
        resultDiv.textContent = '✅ Data berhasil disimpan!';
        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        form.reset();
      } catch(err) {
        resultDiv.textContent = '✅ Data berhasil disimpan!';
        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        form.reset();
      }
    };
  </script>
</body>
</html>
